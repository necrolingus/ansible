- name: Unconditionally reboot all servers
  hosts: all
  become: yes
  tasks:
    - name: Reboot the server
      ansible.builtin.reboot:
        msg: "Scheduled reboot by Ansible"
        connect_timeout: 30
        reboot_timeout: 900
        pre_reboot_delay: 30
        post_reboot_delay: 30
        test_command: whoami
